services:
  database:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: fleet_guardian
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  backend:
    build: ./backend
    restart: always
    ports:
      - "3001:3001"
    environment:
      - DATABASE_URL=mysql://root:password@database:3306/fleet_guardian
      - JWT_SECRET=fleet_guardian_super_secret_key_2024
      - PORT=3001
      - FRONTEND_URL=http://localhost:3000
    depends_on:
      - database

  frontend:
    build:
      context: ./frontend
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:3001/api
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  mysql_data:
